<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>昭和医科大学陸上部 - 今週の練習メニュー</title>
    <style>
        /* 1. CSS（装飾とレイアウトの層） */
        :root {
            --primary-color: #0056b3; /* 昭和大学のスクールカラー等に合わせて変更可能 */
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
            --text-main: #333333;
            --text-muted: #666666;
            --border-radius: 12px;
        }

        body {
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        h1 {
            font-size: 1.8rem;
            color: var(--primary-color);
            margin-bottom: 5px;
        }

        /* メニューを格納するグリッドコンテナ */
        #menu-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            width: 100%;
            max-width: 1000px;
        }

        /* 個別のメニューカード */
        .menu-card {
            background: var(--card-bg);
            border-radius: var(--border-radius);
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            transition: transform 0.2s ease;
            border-top: 5px solid var(--primary-color);
        }

        .menu-card:hover {
            transform: translateY(-5px);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            border-bottom: 1px solid #eee;
            padding-bottom: 10px;
        }

        .day-badge {
            background-color: var(--primary-color);
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 0.9rem;
        }

        .date-text {
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .block-name {
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-bottom: 5px;
            font-weight: bold;
        }

        .menu-content {
            font-size: 1.1rem;
            line-height: 1.5;
            white-space: pre-wrap; /* 改行を反映 */
        }

        /* ローディング表示 */
        .loading {
            text-align: center;
            color: var(--text-muted);
            font-style: italic;
            grid-column: 1 / -1;
        }
    </style>
</head>
<body>
    <nav style="width: 100%; max-width: 1000px; margin-bottom: 10px;">
        <a href="../" style="text-decoration: none; color: var(--primary-color); font-weight: bold;">← ポータルへ戻る</a>
    </nav>

    <header>
        <h1>今週の練習メニュー</h1>
        <p>昭和医科大学陸上部</p>
    </header>

    <main id="menu-container">
        <div class="loading">データベースから最新のメニューを取得中...</div>
    </main>

    <script>
        /* 2. JavaScript（通信と論理の層） */
        
        // 【重要】ここに大学アカウント（またはテスト環境）で発行したGASの「ウェブアプリURL」を貼り付けます
        const API_URL = 'https://script.google.com/macros/s/AKfycbzb_foGbhF7ojqqIr_9KgH1i6CoFdRd1j2RrjZ05J13aHApq1PhxSLchnjf5tuAXQE/exec';

        // ページ読み込み時に実行されるメイン処理
        document.addEventListener('DOMContentLoaded', () => {
            fetchMenuData();
        });

        // GASからJSONを非同期で取得する関数（API通信）
        async function fetchMenuData() {
            const container = document.getElementById('menu-container');

            try {
                // Fetch APIによるGETリクエスト（SwiftのURLSessionと同等の役割）
                const response = await fetch(API_URL);
                if (!response.ok) throw new Error('ネットワークエラーが発生しました');
                
                const data = await response.json();
                
                // ローディング表示を消去
                container.innerHTML = '';

                // データが空の場合の処理
                if (data.length === 0) {
                    container.innerHTML = '<p class="loading">現在、登録されているメニューはありません。</p>';
                    return;
                }

                // 取得したJSON配列をループ処理し、HTML要素（カード）を生成
                data.forEach(item => {
                    const card = createCardElement(item);
                    container.appendChild(card);
                });

            } catch (error) {
                console.error('Error fetching data:', error);
                container.innerHTML = `<p class="loading" style="color: red;">データの読み込みに失敗しました。URLや設定を確認してください。</p>`;
            }
        }

        // 単一のデータオブジェクトからHTML（DOM要素）を生成する関数
        function createCardElement(item) {
            const card = document.createElement('div');
            card.className = 'menu-card';

            // HTMLの骨組みにJSONのデータを流し込む（テンプレートリテラル）
            card.innerHTML = `
                <div class="card-header">
                    <span class="day-badge">${item.note || '指定なし'}</span>
                    <span class="date-text">${item.date || ''}</span>
                </div>
                <div class="block-name">${item.block || 'ブロック未設定'}</div>
                <div class="menu-content">${item.menu || '休み'}</div>
            `;
            return card;
        }
    </script>
</body>
</html>
